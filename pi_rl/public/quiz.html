<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocket League | Página de Quiz</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css" />
    <link rel="icon" href="./assets/imgs/rocket.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
  </head>

  <body>
    <div class="header">
      <div class="container">
        <a href="./index.html"
          ><img
            class="logo"
            src="./assets/imgs/logo_rocket.png"
            alt="Logo do Rocket League"
        /></a>
        <p>Questionário de Conhecimento</p>
      </div>
    </div>
    <div class="quiz_pergunta">
      <h3>
        1-) Qual é o modo de jogo mais popular no competitivo de Rocket League?
      </h3>

      <div class="divquizimg1">
        <img class="quizimg1" src="./assets/imgs/quiz1.gif" alt="" />
      </div>
      <label>
        <input type="radio" name="pergunta1" value="1" />
        1x1 (Duelo)
      </label>

      <label>
        <input type="radio" name="pergunta1" value="2" />
        2x2 (Duplas)
      </label>

      <label>
        <input type="radio" name="pergunta1" value="3" />
        3x3 (Padrão)
      </label>

      <label>
        <input type="radio" name="pergunta1" value="4" />
        Rumble
      </label>

      <label>
        <input type="radio" name="pergunta1" value="5" />
        Hoops
      </label>
    </div>
    <div class="quiz_acoes">
      <button class="btn_proxima">Próxima Pergunta</button>
    </div>
  </body>
</html>

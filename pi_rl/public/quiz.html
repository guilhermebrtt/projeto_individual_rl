<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocket League | Página de Quiz</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css" />
    <link rel="icon" href="./assets/imgs/logo.png" />
  </head>

  <body class="body_quiz">
    <div class="header">
      <div class="container">
        <a href="./index.html">
          <img
            class="logo"
            src="./assets/imgs/logo.png"
            alt="Logo do Rocket League"
          />
        </a>
        <p>Quiz</p>
      </div>
    </div>

    <div id="quiz_container"></div>

    <div class="quiz_acoes">
      <button class="btn_anterior" onclick="perguntaAnterior()">
        Pergunta Anterior
      </button>

      <button class="btn_proxima" id="btnQuiz" onclick="proximaPergunta()">
        Próxima Pergunta
      </button>
    </div>
  </body>
</html>

<script>
  let perguntas = [];
  let perguntaAtual = 0;

  let respostasUsuario = [];

  let acertos = 0;
  let erros = 0;

  const parametros = new URLSearchParams(window.location.search);
  const dificuldade = parametros.get("dificuldade");

  const inicioQuiz = Date.now();

  fetch(`/quiz/listarPerguntasQuiz/${dificuldade}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
  })
    .then(function (resposta) {
      return resposta.json();
    })

    .then(function (dados) {
      perguntas = dados;

      if (sessionStorage.PERGUNTA_ATUAL) {
        perguntaAtual = Number(sessionStorage.PERGUNTA_ATUAL);
      }

      if (sessionStorage.RESPOSTAS) {
        respostasUsuario = JSON.parse(sessionStorage.RESPOSTAS);
      }

      mostrarPergunta();
    })

    .catch(function (erro) {
      console.log(erro);
    });

  function mostrarPergunta() {
    const pergunta = perguntas[perguntaAtual];

    let respostaSalva = "";

    if (respostasUsuario[perguntaAtual]) {
      respostaSalva = respostasUsuario[perguntaAtual].respostaMarcada;
    }

    document.getElementById("quiz_container").innerHTML = `
      <div class="quiz_pergunta">

        <h3>
          ${perguntaAtual + 1}-) ${pergunta.pergunta}
        </h3>

        <label>
          <input 
            type="radio" 
            name="alternativa" 
            value="A"
            ${respostaSalva == "A" ? "checked" : ""}
          >
          ${pergunta.alternativa_a}
        </label>

        <label>
          <input 
            type="radio" 
            name="alternativa" 
            value="B"
            ${respostaSalva == "B" ? "checked" : ""}
          >
          ${pergunta.alternativa_b}
        </label>

        <label>
          <input 
            type="radio" 
            name="alternativa" 
            value="C"
            ${respostaSalva == "C" ? "checked" : ""}
          >
          ${pergunta.alternativa_c}
        </label>

        <label>
          <input 
            type="radio" 
            name="alternativa" 
            value="D"
            ${respostaSalva == "D" ? "checked" : ""}
          >
          ${pergunta.alternativa_d}
        </label>

        <label>
          <input 
            type="radio" 
            name="alternativa" 
            value="E"
            ${respostaSalva == "E" ? "checked" : ""}
          >
          ${pergunta.alternativa_e}
        </label>

        <div id="mensagem_quiz"></div>

      </div>
    `;

    alterarTextoBotao();
  }

  function alterarTextoBotao() {
    const btnQuiz = document.getElementById("btnQuiz");

    if (perguntaAtual == perguntas.length - 1) {
      btnQuiz.innerHTML = "Finalizar Quiz";
    } else {
      btnQuiz.innerHTML = "Próxima Pergunta";
    }
  }

  function proximaPergunta() {
    const alternativaSelecionada = document.querySelector(
      'input[name="alternativa"]:checked',
    );

    if (!alternativaSelecionada) {
      document.getElementById("mensagem_quiz").innerHTML =
        "Selecione uma alternativa antes de continuar.";
      return;
    }

    const pergunta = perguntas[perguntaAtual];
    const respostaUsuario = alternativaSelecionada.value;

    let acertou = false;

    if (respostaUsuario == pergunta.alternativa_correta) {
      acertou = true;
    }

    respostasUsuario[perguntaAtual] = {
      idPergunta: pergunta.id_pergunta,
      respostaMarcada: respostaUsuario,
      respostaCorreta: pergunta.alternativa_correta,
      acertou: acertou,
    };

    sessionStorage.RESPOSTAS = JSON.stringify(respostasUsuario);

    if (perguntaAtual == perguntas.length - 1) {
      finalizarQuiz();
      return;
    }

    perguntaAtual++;

    sessionStorage.PERGUNTA_ATUAL = perguntaAtual;

    mostrarPergunta();
  }

  function perguntaAnterior() {
    if (perguntaAtual > 0) {
      perguntaAtual--;

      sessionStorage.PERGUNTA_ATUAL = perguntaAtual;

      mostrarPergunta();
    }
  }

  function finalizarQuiz() {
    acertos = 0;
    erros = 0;

    for (let i = 0; i < respostasUsuario.length; i++) {
      if (respostasUsuario[i].acertou) {
        acertos++;
      } else {
        erros++;
      }
    }

    const fimQuiz = Date.now();

    const tempoTotal = Math.floor((fimQuiz - inicioQuiz) / 1000);

    const pontuacao = acertos * 10;

    console.log("RESPOSTAS:", respostasUsuario);

    fetch("/quiz/finalizarQuiz", {
      method: "POST",

      headers: {
        "Content-Type": "application/json",
      },

      body: JSON.stringify({
        idUsuarioServer: sessionStorage.ID_USUARIO,
        pontuacaoServer: pontuacao,
        acertosServer: acertos,
        errosServer: erros,
        tempoServer: tempoTotal,
        respostasServer: respostasUsuario,
      }),
    })
      .then(function (resposta) {
        console.log("STATUS:", resposta.status);
        console.log(
          "id_usuario: ",
          sessionStorage.ID_USUARIO,
          "pontuação: ",
          pontuacao,
          "acertos: ",
          acertos,
          "erros: ",
          erros,
          "tempo total: ",
          tempoTotal,
          "respostas: ",
          respostasUsuario,
        );

        if (resposta.ok) {
          sessionStorage.removeItem("PERGUNTA_ATUAL");
          sessionStorage.removeItem("RESPOSTAS");

          window.location = "./dashboard/dashboard.html";
        } else {
          console.log("Erro ao salvar quiz");
        }
      })

      .catch(function (erro) {
        console.log("Erro:", erro);
      });
  }
</script>

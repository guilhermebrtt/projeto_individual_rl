<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocket League | Página de Quiz</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css" />
    <link rel="icon" href="./assets/imgs/rocket.png" />
  </head>

  <body class="body_quiz">
    <div class="header">
      <div class="container">
        <a href="./index.html">
          <img
            class="logo"
            src="./assets/imgs/logo_rocket.png"
            alt="Logo do Rocket League"
          />
        </a>

        <p><b>Questionário de Conhecimento</b></p>
      </div>
    </div>

    <div id="quiz_container"></div>

    <div class="quiz_acoes">
      <button class="btn_proxima" onclick="proximaPergunta()">
        Próxima Pergunta
      </button>
    </div>
  </body>
</html>

<script>
  let perguntas = [];
  let perguntaAtual = 0;

  const parametros = new URLSearchParams(window.location.search);
  const dificuldade = parametros.get("dificuldade");

  fetch(`/quiz/listarPerguntasQuiz/${dificuldade}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      dificuldadeServer: dificuldade,
    }),
  })
    .then(function (resposta) {
      console.log("Resposta recebida:", resposta);

      console.log("Status:", resposta.status);

      if (!resposta.ok) {
        throw new Error(
          `Erro HTTP: ${resposta.status} | Rota provavelmente inexistente`,
        );
      }

      return resposta.json();
    })

    .then(function (dados) {
      console.log("Dados recebidos do banco:", dados);

      perguntas = dados;

      if (perguntas.length == 0) {
        console.log("Nenhuma pergunta encontrada");
        return;
      }

      mostrarPergunta();
    })

    .catch(function (erro) {
      console.log("ERRO COMPLETO:");
      console.log(erro);
    });

  function mostrarPergunta() {
    console.log("Mostrando pergunta:", perguntaAtual);

    const pergunta = perguntas[perguntaAtual];

    console.log("Objeto pergunta:", pergunta);

    document.getElementById("quiz_container").innerHTML = `
      <div class="quiz_pergunta">

        <h3>
          ${perguntaAtual + 1}-) ${pergunta.pergunta}
        </h3>

        <label>
          <input type="radio" name="alternativa" value="A">
          ${pergunta.alternativa_a}
        </label>

        <label>
          <input type="radio" name="alternativa" value="B">
          ${pergunta.alternativa_b}
        </label>

        <label>
          <input type="radio" name="alternativa" value="C">
          ${pergunta.alternativa_c}
        </label>

        <label>
          <input type="radio" name="alternativa" value="D">
          ${pergunta.alternativa_d}
        </label>

        <label>
          <input type="radio" name="alternativa" value="E">
          ${pergunta.alternativa_e}
        </label>

      </div>
    `;
  }

  function proximaPergunta() {
    console.log("Próxima pergunta");

    perguntaAtual++;

    console.log("Índice atual:", perguntaAtual);

    if (perguntaAtual < perguntas.length) {
      mostrarPergunta();
    } else {
      console.log("Quiz finalizado");

      alert("Quiz finalizado!");

      window.location = "../dashboard/dashboard.html";
    }
  }
</script>

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Rocket League | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css" />
    <link rel="icon" href="./assets/imgs/rocket.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
  </head>

  <body>
    <div class="login">
      <div class="alerta_erro">
        <div class="card_erro" id="cardErro"></div>
      </div>
      <a href="./index.html" class="exit">➜</a>
      <div class="container">
        <div class="card card-login">
          <h2>Olá de volta!</h2>
          <form
            class="formulario"
            onsubmit="
              entrar();
              return false;
            "
          >
            <div class="campo">
              <span>E-mail:</span>
              <input id="email_input" type="text" placeholder="Login" />
            </div>
            <div class="campo">
              <span>Senha:</span>
              <input id="senha_input" type="password" placeholder="******" />
            </div>
            <button type="submit" class="botao">Entrar</button>
          </form>
          <div id="mensagem_erro"></div>
          <a href="./cadastro.html" class="ref-cadastro"
            >Ainda não é Cadastrado?</a
          >
        </div>
      </div>
    </div>
  </body>
</html>

<script>
  /* =================================
     VETOR DE TENTATIVAS
  ================================= */

  let tentativas = [];

  function entrar() {
    var emailVar = email_input.value.trim();
    var senhaVar = senha_input.value.trim();

    cardErro.style.display = "block";

    if (emailVar == "" || senhaVar == "") {
      mensagem_erro.innerHTML = "*Preencha todos os campos.";
      return false;
    }
    if (!emailVar.includes("@") || !emailVar.includes(".")) {
      mensagem_erro.innerHTML = "*Digite um e-mail válido.";
      return false;
    }
    if (senhaVar.length < 6) {
      mensagem_erro.innerHTML =
        "*A senha deve possuir pelo menos 6 caracteres.";
      return false;
    }
    if (tentativas.length >= 3) {
      mensagem_erro.innerHTML =
        "*Você excedeu o limite de tentativas. Recarregue a página.";
      return false;
    }

    console.log("FORM LOGIN:", emailVar);
    console.log("FORM SENHA:", senhaVar);

    fetch("/usuarios/autenticar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("ESTOU NO THEN DO entrar()!");
        if (resposta.ok) {
          resposta.json().then((json) => {
            console.log(json);
            sessionStorage.EMAIL_USUARIO = json.email;
            sessionStorage.NOME_USUARIO = json.nome_usuario;
            sessionStorage.ID_USUARIO = json.id_usuario;
            window.location = "homequiz.html";
          });
        } else {
          tentativas.push("erro");
          let tentativasRestantes = 3 - tentativas.length;
          resposta.text().then((texto) => {
            console.error(texto);
            //For com Vetor para verificação de tentativas de login
            let contador = 0;
            for (let i = 0; i < tentativas.length; i++) {
              contador++;
            }
            if (contador >= 3) {
              mensagem_erro.innerHTML =
                "*Você excedeu o limite de tentativas. Recarregue a página.";
            } else {
              mensagem_erro.innerHTML = `*E-mail ou senha incorretos. Tentativas restantes: ${tentativasRestantes}`;
            }
          });
        }
      })
      .catch(function (erro) {
        console.log(erro);
        mensagem_erro.innerHTML = "*Erro de conexão com o servidor.";
      });
    setTimeout(sumirMensagem, 5000);
    return false;
  }
  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>

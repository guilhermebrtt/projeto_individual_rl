<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>AquaTech | Cadastro</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/estilo.css" />
    <link rel="icon" href="./assets/imgs/rocket.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
  </head>

  <body onload="listar()">
    <div class="login">
      <div class="alerta_erro">
        <div class="card_erro" id="cardErro"></div>
      </div>
      <div class="container">
        <a href="./index.html" class="exit">➜</a>
        <div class="card card-login">
          <h2>Bem-vindo!</h2>
          <div class="formulario">
            <div class="campo">
              <span>Nome:</span>
              <input id="nome_input" type="text" placeholder="Seu nome" />
            </div>
            <div class="campo">
              <span>E-mail:</span>
              <input
                id="email_input"
                type="text"
                placeholder="meuemail@pessoal.com"
              />
            </div>
            <div class="campo">
              <span>Senha:</span>
              <input id="senha_input" type="password" placeholder="******" />
            </div>
            <div class="campo">
              <span>Confirmação da Senha:</span>
              <input
                id="confirmacao_senha_input"
                type="password"
                placeholder="******"
              />
            </div>
            <button class="botao" onclick="cadastrar()">Cadastrar</button>
          </div>
          <div id="mensagem_erro"></div>
          <div id="mensagem_concluido"></div>
          <a href="./login.html" class="ref-cadastro">Já sou Cadastrado!</a>
        </div>
      </div>
    </div>
  </body>
</html>

<script>
  function cadastrar() {
    var nomeVar = nome_input.value.trim();
    var emailVar = email_input.value.trim();
    var senhaVar = senha_input.value.trim();
    var confirmacaoSenhaVar = confirmacao_senha_input.value.trim();

    cardErro.style.display = "block";

    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      mensagem_erro.innerHTML = "*Preencha todos os campos.";
      return false;
    }

    if (nomeVar.length < 3) {
      mensagem_erro.innerHTML = "*O nome deve possuir pelo menos 3 caracteres.";
      return false;
    }

    if (!emailVar.includes("@") || !emailVar.includes(".")) {
      mensagem_erro.innerHTML = "*Digite um e-mail válido.";
      return false;
    }

    if (senhaVar.length < 6) {
      mensagem_erro.innerHTML = "*A senha deve possuir no mínimo 6 caracteres.";
      return false;
    }

    if (senhaVar != confirmacaoSenhaVar) {
      mensagem_erro.innerHTML = "*As senhas não coincidem.";
      return false;
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    }).then(function (resposta) {
      console.log("Resposta:", resposta);
      if (resposta.ok) {
        mensagem_concluido.innerHTML = "Cadastro realizado com sucesso!";
        setTimeout(() => {
          window.location = "login.html";
        }, 2000);
        limparFormulario();
      } else {
        resposta.text().then((texto) => {
          console.log(texto);

          if (
            texto.includes("UNIQUE") ||
            texto.includes("Duplicate") ||
            texto.includes("já cadastrado")
          ) {
            mensagem_erro.innerHTML = "*Este e-mail já está cadastrado.";
          } else {
            mensagem_erro.innerHTML = "*Erro ao realizar cadastro.";
          }
        });
      }
    });
    setTimeout(sumirMensagem, 5000);
    return false;
  }
  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
